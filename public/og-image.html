<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OG Image Design</title>
  </head>
  <body
    style="
      margin: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #09090b;
      display: flex;
      align-items: center;
      position: relative;
    "
  >
    <!-- Left content -->
    <div style="padding-left: 80px">
      <div style="width: 48px; height: 2px; background: #f59e0b; margin-bottom: 16px"></div>
      <p
        style="
          font-family: monospace;
          font-size: 13px;
          color: #f59e0b;
          letter-spacing: 0.2em;
          margin: 0 0 20px;
        "
      >
        PORTFOLIO
      </p>
      <h1
        style="
          font-family: monospace;
          font-size: 76px;
          font-weight: 900;
          color: #ffffff;
          margin: 0 0 16px;
          line-height: 1;
        "
      >
        Patsarun Kathinthong
      </h1>
      <p style="font-family: monospace; font-size: 16px; color: #71717a; margin: 0">
        Full Stack Developer
      </p>
    </div>

    <!-- Amber vertical line -->
    <div
      style="
        position: absolute;
        right: 120px;
        top: 50%;
        transform: translateY(-50%);
        width: 2px;
        height: 180px;
        background: #f59e0b;
      "
    ></div>

    <!-- Bottom domain -->
    <p
      style="
        position: absolute;
        bottom: 48px;
        left: 80px;
        font-family: monospace;
        font-size: 12px;
        color: #3f3f46;
        margin: 0;
      "
    >
      patsarun.dev
    </p>
  </body>
</html>
